<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Loop</title>
<style>
  html, body { margin: 0; height: 100%; background: #0c0f14; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var ACCENT = params.get('accent') || '#6CA0DC';

  function hexRgb(hex) {
    var n = parseInt(hex.slice(1), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }
  var A = hexRgb(ACCENT);
  function accent(alpha) { return 'rgba(' + A[0] + ',' + A[1] + ',' + A[2] + ',' + alpha + ')'; }

  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    W = canvas.clientWidth; H = canvas.clientHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // --- nodes (seeded so the constellation is stable) ---
  var seed = 42;
  function rnd() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }

  var N = 34, nodes = [];
  for (var i = 0; i < N; i++) {
    nodes.push({
      bx: rnd(), by: rnd(),                 // base position (0..1)
      ax: 0.012 + rnd() * 0.02,             // drift amplitude
      ay: 0.012 + rnd() * 0.02,
      px: rnd() * Math.PI * 2,              // phase
      py: rnd() * Math.PI * 2,
      r: 1.6 + rnd() * 2.6
    });
  }

  // --- pulses traveling between nodes ---
  var pulses = [];
  for (var p = 0; p < 7; p++) {
    pulses.push({ a: Math.floor(rnd() * N), b: Math.floor(rnd() * N), t: rnd(), speed: 0.12 + rnd() * 0.2 });
  }

  // --- typed terminal loop ---
  var phrases = ['think --with ai', 'build --faster', 'ship --clean', 'review --own-code'];
  var PROMPT = 'arvind@dev:~$ ';
  var CHAR_T = 0.085, HOLD_T = 1.6, GAP_T = 0.35;

  function typedLine(t) {
    var total = 0, durs = phrases.map(function (ph) { return ph.length * CHAR_T + HOLD_T + GAP_T; });
    for (var i = 0; i < durs.length; i++) total += durs[i];
    var lt = t % total;
    for (var i = 0; i < phrases.length; i++) {
      if (lt < durs[i]) {
        var chars = Math.min(phrases[i].length, Math.floor(lt / CHAR_T));
        return PROMPT + phrases[i].slice(0, chars);
      }
      lt -= durs[i];
    }
    return PROMPT;
  }

  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function frame(ms) {
    var t = ms / 1000;
    var positions = [];

    ctx.clearRect(0, 0, W, H);

    // background
    var bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0, '#0c0f14');
    bg.addColorStop(1, '#131a24');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // grid
    ctx.strokeStyle = accent(0.05);
    ctx.lineWidth = 1;
    for (var x = 0; x <= W; x += 36) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (var y = 0; y <= H; y += 36) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    // node positions with slow drift
    for (var i = 0; i < N; i++) {
      var n = nodes[i];
      positions.push({
        x: (n.bx + Math.sin(t * 0.21 + n.px) * n.ax) * W,
        y: (n.by + Math.cos(t * 0.17 + n.py) * n.ay) * H,
        r: n.r
      });
    }

    // links
    var maxD = Math.min(W, H) * 0.42;
    for (var i = 0; i < N; i++) {
      for (var j = i + 1; j < N; j++) {
        var a = positions[i], b = positions[j];
        var d = Math.hypot(a.x - b.x, a.y - b.y);
        if (d < maxD) {
          ctx.strokeStyle = accent((0.25 * (1 - d / maxD)).toFixed(3));
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        }
      }
    }

    // pulses
    for (var p = 0; p < pulses.length; p++) {
      var pu = pulses[p];
      pu.t += pu.speed / 60;
      if (pu.t >= 1) { pu.t = 0; pu.a = pu.b; pu.b = Math.floor(Math.random() * N); }
      var a = positions[pu.a], b = positions[pu.b];
      var px = a.x + (b.x - a.x) * pu.t, py = a.y + (b.y - a.y) * pu.t;
      var g = ctx.createRadialGradient(px, py, 0, px, py, 9);
      g.addColorStop(0, accent(0.9));
      g.addColorStop(1, accent(0));
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(px, py, 9, 0, Math.PI * 2); ctx.fill();
    }

    // nodes
    for (var i = 0; i < N; i++) {
      var pos = positions[i];
      var tw = 0.55 + 0.45 * Math.sin(t * 1.4 + i * 1.7);
      var g = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, pos.r * 5);
      g.addColorStop(0, accent((0.4 * tw).toFixed(3)));
      g.addColorStop(1, accent(0));
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(pos.x, pos.y, pos.r * 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(220, 234, 248, ' + (0.5 + 0.5 * tw).toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(pos.x, pos.y, pos.r, 0, Math.PI * 2); ctx.fill();
    }

    // typed terminal line
    var line = typedLine(t);
    var fs = Math.max(12, Math.round(Math.min(W, H) * 0.055));
    ctx.font = '500 ' + fs + 'px ui-monospace, Menlo, monospace';
    ctx.fillStyle = 'rgba(168, 200, 230, 0.92)';
    var tx = Math.round(W * 0.055), ty = H - Math.round(H * 0.09);
    ctx.fillText(line, tx, ty);
    // caret
    if (Math.floor(t * 2) % 2 === 0) {
      ctx.fillStyle = accent(0.95);
      ctx.fillRect(tx + ctx.measureText(line).width + 5, ty - fs + 3, Math.max(6, fs * 0.45), fs);
    }

    // soft vignette for the classic look
    var v = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.35, W / 2, H / 2, Math.max(W, H) * 0.75);
    v.addColorStop(0, 'rgba(0,0,0,0)');
    v.addColorStop(1, 'rgba(0,0,0,0.34)');
    ctx.fillStyle = v;
    ctx.fillRect(0, 0, W, H);

    if (!reduced) requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
